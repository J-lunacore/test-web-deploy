<div id="login-container" style="position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 10;">
    <div id="g_id_onload" 
         data-client_id="470750463239-0kddh7qd8v5pgsdscg3lvenkksj8gk69.apps.googleusercontent.com.apps.googleusercontent.com" 
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
    // 루나틱의 최신 설정값 적용
    const firebaseConfig = {
        apiKey: "AIzaSyA6wocMpwC8ZXaCL7R63iz8-bpINW-SsiE",
        authDomain: "dclowlifeblocker.firebaseapp.com",
        projectId: "dclowlifeblocker",
        storageBucket: "dclowlifeblocker.firebasestorage.app",
        messagingSenderId: "470750463239",
        appId: "1:470750463239:web:1d2fe7f53cfff2559d71a2",
        measurementId: "G-X2TX4SYHCP"
    };

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // [수정됨] 구글 로그인 콜백 함수
    function handleCredentialResponse(response) {
        // 구글에서 받은 토큰으로 파이어베이스 인증 수행
        const credential = firebase.auth.GoogleAuthProvider.credential(response.credential);
        auth.signInWithCredential(credential).then((result) => {
            console.log("로그인 성공!", result.user);
            // 페이지 새로고침 없이 상태 반영을 위해 자동 감시 로직이 작동함
        }).catch((error) => {
            console.error("인증 실패:", error);
            alert("로그인에 실패했습니다. 관리자 설정을 확인하세요.");
        });
    }

    // 인증 상태 실시간 감시 (기존 로직 유지)
    auth.onAuthStateChanged(async (user) => {
        const statusDiv = document.getElementById('auth-status');
        const loginContainer = document.getElementById('login-container');
        const payBtn = document.getElementById('pay-button');

        if (user) {
            statusDiv.innerHTML = `<span>${user.email}</span> <button onclick="auth.signOut()" style="border:1px solid white; color:white; background:none; cursor:pointer; padding:2px 5px;">로그아웃</button>`;
            loginContainer.style.display = 'none';
            
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists && userDoc.data().isPremium) {
                payBtn.innerText = "프리미엄 활성화됨";
                payBtn.disabled = true;
            }
        } else {
            statusDiv.innerHTML = "";
            loginContainer.style.display = 'flex';
            payBtn.innerText = "로그인 후 구매 가능";
            payBtn.disabled = true;
        }
    });

    async function requestPayment() {
        const user = auth.currentUser;
        if (!user) return;

        if (confirm('1,100원 결제를 진행하시겠습니까? (테스트 확인용)')) {
            await db.collection('users').doc(user.uid).set({
                email: user.email,
                isPremium: true,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            alert('성공적으로 업그레이드되었습니다!');
        }
    }
</script>
