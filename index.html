<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Premium Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0064ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: #000; }
        #bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: url('결제페이지용임시ai사진.png') no-repeat center center;
            background-size: cover;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: -1;
        }
        .pricing-container {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; height: 100vh; padding: 20px;
        }
        .plan-card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border-radius: 24px; padding: 40px; width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.15); color: white; text-align: center;
            transition: 0.3s; position: relative;
        }
        .plan-card.pro { border: 2px solid var(--primary); background: rgba(0, 100, 255, 0.05); }
        .price { font-size: 44px; font-weight: 700; margin: 20px 0; }
        .features { list-style: none; padding: 0; text-align: left; margin: 30px 0; font-size: 15px; }
        .features li { margin-bottom: 14px; display: flex; align-items: center; }
        .features li::before { content: "✓"; color: var(--primary); margin-right: 12px; font-weight: bold; }
        .btn-plan { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-pro { background: var(--primary); color: white; }
        .btn-pro:disabled { background: #444; cursor: not-allowed; }
        #auth-status { position: fixed; top: 20px; right: 20px; color: white; font-size: 14px; z-index: 20; }
    </style>
</head>
<body>
    <div id="bg-image"></div>
    <div class="overlay"></div>
    <div id="auth-status"></div>

    <div class="pricing-container">
        <div class="plan-card">
            <h3>Free</h3>
            <div class="price">₩0</div>
            <ul class="features">
                <li>차단 23회 제한</li>
                <li>기본 커스텀 메뉴</li>
            </ul>
            <button class="btn-plan" style="background: rgba(255,255,255,0.15); color: white;">현재 플랜</button>
        </div>

        <div class="plan-card pro">
            <h3>Premium</h3>
            <div class="price">₩1,100</div>
            <ul class="features">
                <li><strong>차단 무제한</strong></li>
                <li>전문 자동 엔진</li>
            </ul>
            <button id="pay-button" class="btn-plan btn-pro" onclick="requestPayment()">지금 업그레이드</button>
        </div>
    </div>

    <div id="login-container" style="position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 10;">
        <div id="g_id_onload" 
             data-client_id="470750463239-0kddh7qd8v5pgsdscg3lvenkksj8gk69.apps.googleusercontent.com" 
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA6wocMpwC8ZXaCL7R63iz8-bpINW-SsiE",
            authDomain: "dclowlifeblocker.firebaseapp.com",
            projectId: "dclowlifeblocker",
            storageBucket: "dclowlifeblocker.firebasestorage.app",
            messagingSenderId: "470750463239",
            appId: "1:470750463239:web:1d2fe7f53cfff2559d71a2",
            measurementId: "G-X2TX4SYHCP"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function handleCredentialResponse(response) {
            const credential = firebase.auth.GoogleAuthProvider.credential(response.credential);
            auth.signInWithCredential(credential).then(() => {
                console.log("로그인 성공!");
            }).catch((error) => {
                alert("인증 실패: " + error.message);
            });
        }

        auth.onAuthStateChanged(async (user) => {
            const statusDiv = document.getElementById('auth-status');
            const loginContainer = document.getElementById('login-container');
            const payBtn = document.getElementById('pay-button');

            if (user) {
                statusDiv.innerHTML = `<span>${user.email}</span> <button onclick="auth.signOut()" style="border:1px solid white; color:white; background:none; cursor:pointer; margin-left:10px;">로그아웃</button>`;
                loginContainer.style.display = 'none';
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists && doc.data().isPremium) {
                    payBtn.innerText = "프리미엄 활성화됨";
                    payBtn.disabled = true;
                } else {
                    payBtn.innerText = "지금 업그레이드";
                    payBtn.disabled = false;
                }
            } else {
                statusDiv.innerHTML = "";
                loginContainer.style.display = 'flex';
                payBtn.innerText = "로그인 후 구매 가능";
                payBtn.disabled = true;
            }
        });

        async function requestPayment() {
            const user = auth.currentUser;
            if (!user) return;
            if (confirm('1,100원 결제를 진행하시겠습니까? (테스트)')) {
                await db.collection('users').doc(user.uid).set({
                    email: user.email, isPremium: true, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                alert('업그레이드 완료!');
            }
        }
    </script>
</body>
</html>
