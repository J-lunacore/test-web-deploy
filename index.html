<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Verification Gateway</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #fafafa; }
        .container { text-align: center; border: 1px solid #eee; padding: 50px; border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.2s; }
        .btn-google { background: #4285F4; color: white; }
        .btn-toss { background: #0064ff; color: white; display: none; } /* 결제 버튼은 로그인 후에만 노출 */
    </style>
</head>
<body>
    <div class="container">
        <h2>Premium Verification</h2>
        <p>인증 후 무제한 기능을 이용하세요.</p>
        
        <div id="g_id_onload"
             data-client_id="YOUR_WEB_CLIENT_ID"
             data-callback="onGoogleLogin">
        </div>
        <div class="g_id_signin" data-type="standard"></div>

        <button id="toss-btn" class="btn btn-toss">프리미엄 결제하기 (1,100원)</button>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        function onGoogleLogin(response) {
            console.log("로그인 성공, 이제 결제 버튼을 엽니다.");
            document.getElementById('toss-btn').style.display = 'inline-block';
            // 여기서 서버나 확장프로그램으로 정보를 쏘는 로직이 들어갑니다.
        }
    </script>
</body>
</html>
